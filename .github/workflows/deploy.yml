name: Deploy to k15-server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy env files from secure folder
        run: |
          cp ~/env-config/healthcheck-env/frontend.env ./apps/frontend/.env
          cp ~/env-config/healthcheck-env/backend.env ./apps/backend/.env

      - name: Build and start containers
        run: |
          docker compose build
          docker compose up -d

      - name: Clean up old images
        run: docker image prune -f