services:
  frontend:
    build:
      context: ./apps/frontend
      args:
        - NEXT_PUBLIC_API_URL=http://k15-server:3004
    container_name: opennotify-frontend
    restart: unless-stopped
    ports:
      - "3003:3000"
    env_file:
      - ./apps/frontend/.env
    environment:
      - MONOLITH_API_URL=http://opennotify-backend:3001
    networks:
      - opennotify-net

  backend:
    build:
      context: ./apps/backend
    container_name: opennotify-backend
    restart: unless-stopped
    ports:
      - "3004:3001"
    env_file:
      - ./apps/backend/.env
    networks:
      - opennotify-net
      - shared-net

networks:
  opennotify-net:
    driver: bridge
  shared-net:
    external: true
